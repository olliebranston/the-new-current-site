name: Inspect UK carbon accounting sources

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/inspect_uk_carbon_accounting_sources.py"
      - ".github/workflows/inspect-uk-carbon-accounting-sources.yml"

jobs:
  inspect-sources:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pandas openpyxl odfpy

      - name: Run source inspection script
        run: python scripts/inspect_uk_carbon_accounting_sources.py

      - name: Commit inspection output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/uk-carbon-accounting-source-inspection.json
          git diff --cached --quiet || git commit -m "Inspect UK carbon accounting sources"
          git pull --rebase origin main
          git push origin main
