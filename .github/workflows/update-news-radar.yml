name: Update news radar

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */12 * * *"
  push:
    paths:
      - "scripts/fetch_news_radar.py"
      - "scripts/validate_site.py"
      - "requirements.txt"
      - ".github/workflows/update-news-radar.yml"

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run news radar script
        run: python scripts/fetch_news_radar.py

      - name: Validate site data
        run: python scripts/validate_site.py

      - name: Commit updated news radar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-radar.json
          git diff --cached --quiet || git commit -m "Update news radar"
          git pull --rebase origin main
          git push
