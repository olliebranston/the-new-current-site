name: Update generation mix data

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/fetch_generation_mix_over_time.py"
      - "scripts/validate_site.py"
      - "requirements.txt"
      - ".github/workflows/update-generation-mix-data.yml"

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run generation mix data script
        run: python scripts/fetch_generation_mix_over_time.py

      - name: Validate site data
        run: python scripts/validate_site.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update generation mix data"
          git pull --rebase origin main
          git push origin main
