name: Update comparison charts

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  push:
    paths:
      - "scripts/fetch_live_carbon_data.py"
      - "scripts/fetch_live_power_price_data.py"
      - "scripts/fetch_generation_mix_over_time.py"
      - "scripts/fetch_live_grid_snapshot.py"
      - "scripts/validate_site.py"
      - "requirements.txt"
      - ".github/workflows/update-comparison-charts.yml"

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run carbon intensity script
        run: python scripts/fetch_live_carbon_data.py

      - name: Run power price script
        run: python scripts/fetch_live_power_price_data.py

      - name: Run generation mix script
        run: python scripts/fetch_generation_mix_over_time.py

      - name: Run live grid snapshot script
        run: python scripts/fetch_live_grid_snapshot.py

      - name: Validate site data
        run: python scripts/validate_site.py

      - name: Commit updated comparison chart data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update comparison chart data"
          git pull --rebase origin main
          git push origin main
