name: Update green generation and bill data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 5 * *"
  push:
    paths:
      - "scripts/fetch_green_generation_bills_data.py"
      - ".github/workflows/update-green-generation-bills-data.yml"

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pandas openpyxl

      - name: Run green generation and bill data script
        run: python scripts/fetch_green_generation_bills_data.py

      - name: Commit updated chart data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update green generation and bill data"
          git pull --rebase origin main
          git push origin main
