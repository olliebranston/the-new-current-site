name: Render static layout

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - "articles/*.html"
      - "data/thought-pieces.json"
      - "scripts/render_static_layout.py"
      - "templates/**"
      - ".github/workflows/render-static-layout.yml"

concurrency:
  group: render-static-layout-main
  cancel-in-progress: false

jobs:
  render-layout:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync with latest main
        run: |
          git checkout main
          git pull --ff-only origin main

      - name: Render shared layout and article navigation
        run: python scripts/render_static_layout.py

      - name: Validate static site
        run: python scripts/validate_site.py

      - name: Commit rendered layout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html articles/*.html
          git diff --cached --quiet || git commit -m "Render static layout"
          git push origin HEAD:main
